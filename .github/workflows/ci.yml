name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==========================================================================
  # JOB 1: Lint + Security (gates rápidos — falham primeiro)
  # ==========================================================================
  # Estratégia "fail-fast no barato": gates que rodam em segundos vêm antes
  # dos testes. Se o lint falhar, não faz sentido rodar 23 testes.
  # ==========================================================================
  lint_and_security:
    name: Lint (Ruff) + Security (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instala ferramentas de qualidade
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9 bandit==1.7.10

      # GATE 4 — Lint: zero erros no Ruff.
      - name: "Gate 4: Ruff (lint)"
        run: ruff check app/ tests/

      # GATE 3 — Security: zero vulnerabilidade HIGH no Bandit.
      # -ll  = level low (mostra todos)
      # -lll = só high (gate real)
      # Usamos -lll porque MEDIUM já é bloqueante em produção real,
      # mas pro projeto acadêmico, HIGH é o gate mínimo.
      - name: "Gate 3: Bandit (security)"
        run: bandit -lll -r app/

  # ==========================================================================
  # JOB 2: Testes (unit + integração + E2E) + Cobertura
  # ==========================================================================
  # Roda Postgres real (porta 5433) e fake_gateway em background.
  # Igual ao ambiente local — fidelidade > velocidade.
  # ==========================================================================
  tests:
    name: Testes (unit + integração + E2E) + Cobertura
    runs-on: ubuntu-latest
    needs: lint_and_security  # só roda se o lint passou

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pagamentos_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/pagamentos_test"
      GATEWAY_URL: "http://localhost:8001"

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configura Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instala dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r fake_gateway/requirements.txt

      - name: Sobe o fake_gateway em background
        run: |
          cd fake_gateway
          nohup uvicorn main:app --host 0.0.0.0 --port 8001 > gateway.log 2>&1 &
          sleep 3
          curl --fail http://localhost:8001/health || (cat gateway.log && exit 1)

      # GATE 1 — Cobertura geral ≥ 70%.
      # GATE 2 — Cobertura da calculadora ≥ 95% (rodada separada).
      # GATE 5 — Zero testes pulados (--strict-markers + verifica no log).
      - name: "Gates 1, 2 e 5: Testes + Cobertura + Zero Skip"
        run: |
          pytest -v --strict-markers \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            | tee pytest_output.txt

          # GATE 5 — Falha se houver QUALQUER teste pulado/xfailed.
          if grep -E "skipped|xfailed" pytest_output.txt; then
            echo "::error::Gate 5 falhou — há testes pulados no main."
            exit 1
          fi

      - name: "Gate 2: Cobertura da calculadora >= 95%"
        run: |
          pytest tests/test_calculadora.py \
            --cov=app.core.calculadora \
            --cov-fail-under=95