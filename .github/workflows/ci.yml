# ============================================
# Pipeline de Integração Contínua (CI)
# Microserviço de Pagamentos
# ============================================
# Este workflow é executado automaticamente pelo GitHub Actions
# a cada push ou pull request na branch main.
#
# Objetivo: garantir que todos os testes unitários continuam
# passando antes de qualquer código ser integrado.

name: CI - Microserviço de Pagamentos

# Eventos que disparam o pipeline
on:
  # Quando alguém faz push na main
  push:
    branches: [main]
  # Quando alguém abre um pull request mirando a main
  pull_request:
    branches: [main]

# Definição dos jobs (tarefas) do workflow
jobs:
  # Único job deste pipeline: rodar testes
  test:
    name: Rodar testes unitários
    runs-on: ubuntu-latest  # Máquina virtual Linux fornecida pelo GitHub

    steps:
      # Passo 1: Baixa o código do repositório para dentro do runner
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: Instala o Python 3.12 no runner
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'  # Acelera execuções futuras cacheando dependências

      # Passo 3: Instala as dependências do projeto
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Passo 4: Executa os testes com pytest
      - name: Rodar testes com pytest
        run: pytest -v